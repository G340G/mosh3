name: Generate Avant-Garde Video
on:
  workflow_dispatch:
    inputs:
      input_video_v1:
        description: 'Name of primary clip file inside your repo root (e.g. video.mp4)'
        required: true
        default: 'input.mp4'
      input_video_v2:
        description: 'Optional cross-mosh video name (leave blank to self-glitch V1)'
        required: false
        default: ''
      preset:
        description: 'Named look (overrides below still apply on top): none, clinical_dread, flesh_bloom, signal_rot, liturgy'
        required: false
        default: 'none'
      mosh_mode:
        description: 'Datamosh strategy: flow, block, hybrid, stutter'
        required: false
        default: 'flow'
      effects:
        description: 'Comma list of active effects (blank = all): chroma,sort,slitscan,scramble,invert,drift,scanline,vhs,posterize'
        required: false
        default: ''
      chaos_factor:
        description: 'Overall entropy/chaos scale index (0.5 to 5.0)'
        required: false
        default: '2.5'
      smear_drag:
        description: 'Optical flow pixel smear displacement (0.0 to 3.0)'
        required: false
        default: '1.5'
      chroma_bleed:
        description: 'Color-separation index (0.0 to 3.0)'
        required: false
        default: '1.2'
      feedback:
        description: 'Ghost-trail blend from accumulated canvas (0.0 to 1.0)'
        required: false
        default: '0.0'
      feedback_decay:
        description: 'How long ghost trails linger (0.0 to 1.0)'
        required: false
        default: '0.7'
      stutter:
        description: 'Audio buffer manipulation rate (0.0 to 1.0)'
        required: false
        default: '0.2'
      drone_hz:
        description: 'Base frequency of the synthesized drone audio (Hz)'
        required: false
        default: '45'
      width:
        description: 'Working frame width in pixels'
        required: false
        default: '640'
      height:
        description: 'Working frame height in pixels'
        required: false
        default: '480'
      fps:
        description: 'Output frame rate'
        required: false
        default: '24'
      crf:
        description: 'Output quality (lower = better/larger file, 18-28 typical)'
        required: false
        default: '22'
jobs:
  glitch-art-engine:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install System FFmpeg Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    - name: Install PyDeps
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python-headless numpy
    - name: Process Video via Metanoia Engine
      run: |
        # Construct run command conditionally for optional inputs
        V2_ARG=""
        if [ ! -z "${{ github.event.inputs.input_video_v2 }}" ]; then
          V2_ARG="--v2 ${{ github.event.inputs.input_video_v2 }}"
        fi

        PRESET_ARG=""
        if [ "${{ github.event.inputs.preset }}" != "none" ] && [ ! -z "${{ github.event.inputs.preset }}" ]; then
          PRESET_ARG="--preset ${{ github.event.inputs.preset }}"
        fi

        EFFECTS_ARG=""
        if [ ! -z "${{ github.event.inputs.effects }}" ]; then
          EFFECTS_ARG="--effects ${{ github.event.inputs.effects }}"
        fi

        python metanoia_v15.py \
          --v1 "${{ github.event.inputs.input_video_v1 }}" \
          $V2_ARG \
          $PRESET_ARG \
          $EFFECTS_ARG \
          --mosh-mode "${{ github.event.inputs.mosh_mode }}" \
          --chaos "${{ github.event.inputs.chaos_factor }}" \
          --drag "${{ github.event.inputs.smear_drag }}" \
          --chroma "${{ github.event.inputs.chroma_bleed }}" \
          --feedback "${{ github.event.inputs.feedback }}" \
          --feedback-decay "${{ github.event.inputs.feedback_decay }}" \
          --stutter "${{ github.event.inputs.stutter }}" \
          --drone-hz "${{ github.event.inputs.drone_hz }}" \
          --width "${{ github.event.inputs.width }}" \
          --height "${{ github.event.inputs.height }}" \
          --fps "${{ github.event.inputs.fps }}" \
          --crf "${{ github.event.inputs.crf }}" \
          --out "glitched_output.mp4"
    - name: Upload Glitched Video Artifact
      uses: actions/upload-artifact@v4
      with:
        name: avant-garde-glitched-video
        path: glitched_output.mp4
        retention-days: 5

