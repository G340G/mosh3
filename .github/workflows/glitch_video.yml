name: Generate Avant-Garde Video

on:
  workflow_dispatch:
    inputs:
      input_video_v1:
        description: 'Name of primary clip file inside your repo root (e.g. video.mp4)'
        required: true
        default: 'input.mp4'
      input_video_v2:
        description: 'Optional cross-mosh video name (Leave blank to self-glitch V1)'
        required: false
        default: ''
      chaos_factor:
        description: 'Overall entropy/chaos scale index (0.5 to 5.0)'
        required: false
        default: '2.5'
      smear_drag:
        description: 'Optical flow pixel smear displacement (0.0 to 3.0)'
        required: false
        default: '1.5'

jobs:
  glitch-art-engine:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System FFmpeg Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install PyDeps
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python-headless numpy

    - name: Process Video via Metanoia Engine
      run: |
        # Construct run command conditionally if optional input v2 is filled
        V2_ARG=""
        if [ ! -z "${{ github.event.inputs.input_video_v2 }}" ]; then
          V2_ARG="--v2 ${{ github.event.inputs.input_video_v2 }}"
        fi
        
        python main.py \
          --v1 "${{ github.event.inputs.input_video_v1 }}" \
          $V2_ARG \
          --chaos ${{ github.event.inputs.chaos_factor }} \
          --drag ${{ github.event.inputs.smear_drag }} \
          --out "glitched_output.mp4"

    - name: Upload Glitched Video Artifact
      uses: actions/upload-artifact@v4
      with:
        name: avant-garde-glitched-video
        path: glitched_output.mp4
        retention-days: 5
